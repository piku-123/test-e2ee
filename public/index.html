<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AppState Manager</title>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
height:300px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}
</style>

</head>
<body>

<h2>Messenger AppState</h2>

<textarea id="appstate"></textarea>

<br>

<button onclick="saveAppState()">
Save & Start
</button>

<p id="status"></p>

<script>
async function saveAppState() {

let data;

try{
data = JSON.parse(
document.getElementById("appstate").value
);
}catch{
return alert("Invalid JSON");
}

const res = await fetch(
"/save-appstate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
}
);

const result = await res.json();

document.getElementById("status").innerText =
result.message || result.error;

location.reload();
}
</script>

</body>
</html>
